<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoniText - Mi Historial</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../src/styles.css">

    <script type="module">
        import { userManager } from "../src/auth.js";

        (async () => {
            const user = await userManager.getUser();
            if (!user || user.expired) {
                await userManager.signinRedirect({ prompt: 'login' });
            }
        })();
    </script>
</head>

<body>
    <!-- Auth button -->
    <div class="auth-buttons">
        <a href="app.html" class="btn btn-outline-info me-2">
            <i class="fas fa-home me-1"></i>Nueva Transcripción
        </a>
        <button type="button" class="btn btn-outline-light" id="logoutBtn">
            <i class="fas fa-sign-in-alt me-1"></i>Cerrar Sesión
        </button>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="header-section text-center mb-4">
                    <div class="title-with-icon">
                        <h1 class="header-title">Mi Historial</h1>
                        <i class="fas fa-chart-bar header-icon-inline"></i>
                    </div>
                    <p class="header-subtitle">Resumen de tu consumo y audios procesados</p>
                </div>
            </div>
        </div>

        <!-- Usage Stats -->
        <div class="row justify-content-center mb-4">
            <div class="col-lg-9">
                <div class="upload-card">
                    <h3 class="mb-3"><i class="fas fa-tachometer-alt me-2"></i>Consumo de tu plan</h3>
                    <div class="progress mb-3" style="height: 25px;">
                        <div id="usageProgressBar" class="progress-bar" role="progressbar" style="width: 0%;"
                            aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span id="usedTimeText">Usado: 0s</span>
                        <span id="remainingTimeText">Restante: 600s</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Jobs List -->
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="upload-card">
                    <h3 class="mb-4"><i class="fas fa-list me-2"></i>Mis Archivos</h3>
                    <div id="loadingIndicator" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                        <p class="mt-2">Cargando historial...</p>
                    </div>

                    <div id="jobsList" class="jobs-list" style="display: none;">
                        <!-- Se insertan los items desde JS -->
                    </div>

                    <div id="emptyState" class="text-center py-4" style="display: none;">
                        <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
                        <p>No tienes archivos procesados aún.</p>
                        <a href="app.html" class="btn btn-primary mt-2">Subir mi primer audio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals for results -->
    <div id="resultModal" class="custom-modal">
        <div class="custom-modal-content">
            <div class="custom-modal-header d-flex justify-content-between align-items-center">
                <h3 id="modalTitle">Resultado</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="custom-modal-body">
                <div id="modalContent" class="p-3" style="white-space: pre-wrap; border-radius: 8px; max-height: 400px; overflow-y: auto; word-wrap: break-word;">
                </div>
            </div>
            <div class="custom-modal-footer mt-3 text-end">
                <button type="button" class="btn btn-secondary close-modal-btn">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-8">
                    <p class="text-white-50 mb-0">©2026 SoniText</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <a href="privacy.html" class="text-white-50 text-decoration-none">
                        <i class="fas fa-shield-alt me-1"></i>Política de Privacidad
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script type="module" src="../src/dashboard.js"></script>
    <script type="module" src="../src/logoutHandler.js"></script>
</body>

</html>
