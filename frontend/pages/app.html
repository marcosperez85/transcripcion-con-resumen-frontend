<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoniText - No pierdas tiempo con audios largos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../src/styles.css">

    <script type="module">
        import { userManager } from "../src/auth.js";
        import { checkUserUsage } from "../src/statusChecker.js";

        // URL base de tu producto en Lemon Squeezy (REEMPLAZAR CON LA URL REAL)
        // Por lo general tiene este formato: https://[tu-tienda].lemonsqueezy.com/checkout/buy/[VARIANT_ID]
        // O si usas dominio personalizado: https://shop.sonitext.com/checkout/buy/[VARIANT_ID]
        const LEMON_SQUEEZY_CHECKOUT_URL = "https://shop.sonitext.com/checkout/buy/REEMPLAZAR_ID_DEL_PRODUCTO";

        (async () => {
            const user = await userManager.getUser();
            if (!user || user.expired) {
                await userManager.signinRedirect({ prompt: 'login' });
            } else {
                // Exponer función de checkout globalmente
                window.abrirCheckout = () => {
                    const userId = user.profile.sub;
                    // Añadimos el user_id al custom_data de la URL
                    const checkoutUrl = `${LEMON_SQUEEZY_CHECKOUT_URL}?checkout[custom][user_id]=${encodeURIComponent(userId)}`;
                    window.location.href = checkoutUrl;
                };

                // Comprobar si hay una intención de compra pendiente desde el Landing Page
                if (localStorage.getItem("pendingPurchase") === "true") {
                    localStorage.removeItem("pendingPurchase");
                    // Dar un pequeño tiempo para que cargue la UI antes de redirigir al checkout
                    setTimeout(() => {
                        window.abrirCheckout();
                    }, 500);
                }

                // Al verificar que el usuario está autenticado, intentamos obtener datos de uso
                try {
                    await checkUserUsage();
                } catch (error) {
                    console.error("Error cargando datos de uso:", error);
                }
            }
        })();

        document.addEventListener("DOMContentLoaded", () => {
            const btnComprarApp = document.getElementById("btnComprarApp");
            if (btnComprarApp) {
                btnComprarApp.addEventListener("click", () => {
                    if (window.abrirCheckout) window.abrirCheckout();
                });
            }
        });
    </script>
</head>

<body>
    <!-- Auth button -->
    <div class="auth-buttons">
        <button type="button" class="btn btn-warning me-2 fw-bold text-dark" id="btnComprarApp">
            <i class="fas fa-bolt me-1"></i>Comprar 10 Horas
        </button>
        <a href="userDashboard.html" class="btn btn-outline-info me-2">
            <i class="fas fa-history me-1"></i>Mi Historial
        </a>
        <button type="button" class="btn btn-outline-light" id="logoutBtn">
            <i class="fas fa-sign-in-alt me-1"></i>Cerrar Sesión
        </button>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="header-section text-center mb-4">
                    <div class="title-with-icon">
                        <h1 class="header-title">SoniText</h1>
                        <i class="fas fa-microphone-alt header-icon-inline"></i>
                    </div>
                    <p class="header-subtitle">No pierdas tiempo con audios largos</p>
                </div>
            </div>
        </div>

        <!-- Upload Form -->
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="upload-card">
                    <form id="uploadForm">
                        <div class="mb-4">
                            <label for="audioFile" class="form-label">
                                <i class="fas fa-file-audio me-2"></i>Archivo de Audio
                            </label>
                            <div class="file-input-wrapper">
                                <input class="form-control file-input" type="file" id="audioFile"
                                    accept=".amr,.flac,.m4a,.mp3,.mp4,.ogg,.webm,.wav">
                                <div class="file-input-overlay">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                    <span>Arrastra tu archivo de audio aquí o haz clic para seleccionar</span>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="idioma" class="form-label">
                                    <i class="fas fa-language me-2"></i>Idioma (opcional)
                                </label>
                                <select class="form-select" id="idioma">
                                    <option value="es-ES">Español (España)</option>
                                    <option value="es-MX">Español (México)</option>
                                    <option value="en-US">English (US)</option>
                                    <option value="en-GB">English (UK)</option>
                                    <option value="fr-FR">Français</option>
                                    <option value="pt-BR">Português (Brasil)</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="speakers" class="form-label">
                                    <i class="fas fa-users me-2"></i>Número de Hablantes (opcional)
                                </label>
                                <input class="form-control" type="number" id="speakers" min="1" max="10" value="2">
                                <div id="uploadError" style="color:red;margin-top:10px;"></div>
                            </div>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-lg px-5">
                                <i class="fas fa-play me-2"></i>Iniciar Transcripción
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Results will be inserted here -->
    </div>

    <!-- Footer -->
    <footer class="py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-8">
                    <p class="text-white-50 mb-0">
                        ©2026 SoniText
                    </p>
                </div>
                <div class="col-md-4 text-md-end">
                    <a href="privacy.html" class="text-white-50 text-decoration-none">
                        <i class="fas fa-shield-alt me-1"></i>Política de Privacidad
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script type="module" src="../src/main.js"></script>
    <script type="module" src="../src/logoutHandler.js"></script>
</body>

</html>
